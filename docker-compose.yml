services:

  app1:
    build: .
    container_name: app1
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/jobportal
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8081:8080"

  app2:
    build: .
    container_name: app2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/jobportal
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8082:8080"

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2