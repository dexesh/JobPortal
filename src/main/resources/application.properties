spring.datasource.username=jobportal
spring.datasource.password=jobportal
spring.datasource.url=jdbc:mysql://localhost:3306/jobportal
pinecone.api.key=${PINECONE_API_KEY}
pinecone.index.name=${PINECONE_INDEX_NAME:embeddingindex}
# Ollama server
spring.ai.ollama.base-url=http://localhost:11434

# Chat model for resume summarisation (llama3 runs locally)
spring.ai.ollama.chat.options.model=llama3.2:latest

# Enable embedding model
spring.ai.model.embedding=ollama
spring.ai.ollama.embedding.options.model=mxbai-embed-large

# Spring AI Retry auto-configuration crashes with Spring Boot 3.3.x due to
# a missing Spring Framework class (`org.springframework.core.retry.RetryTemplate`).
# We exclude it so the application can start.
spring.autoconfigure.exclude=org.springframework.ai.retry.autoconfigure.SpringAiRetryAutoConfiguration

spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=500
spring.ai.retry.backoff.multiplier=1.5
spring.ai.retry.backoff.max-interval=2000

# Temporary workaround: duplicate Jackson auto-config modules are being pulled
# onto the classpath (different Spring Boot artifacts), which registers the
# same bean name twice. Allow overriding so the app can start.
spring.main.allow-bean-definition-overriding=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
server.tomcat.mbeanregistry.enabled=true
server.tomcat.threads.max=400
server.tomcat.accept-count=1000

# Resume summarisation and first-run vector backfill can exceed Spring MVC's
# default 30-second async timeout, especially when Ollama runs safely on CPU.
spring.mvc.async.request-timeout=180000

# Shared production cache. Override REDIS_PASSWORD outside source control.
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:jobportal-cache-change-me}
spring.data.redis.connect-timeout=2s
spring.data.redis.timeout=3s
spring.data.redis.repositories.enabled=false
