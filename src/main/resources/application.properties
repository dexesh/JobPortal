spring.datasource.username=YOUR_DATABASE_USERNAME
spring.datasource.password=YOUR_DATABASE_PASSWORD    
spring.datasource.url=YOUR_DATABASE_URL
pinecone.api.key=YOUR_PINECONE_API_KEY
# Ollama server
spring.ai.ollama.base-url=LOCAL_OLLAMA_URL

# Chat model for resume summarisation (llama3 runs locally)
spring.ai.ollama.chat.options.model=YOUR_LLM_MODEL

# Enable embedding model
spring.ai.model.embedding=YOUR_EMBEDDING_MODEL
spring.ai.ollama.embedding.options.model=YOUR_EMBEDDING_MODEL

# Spring AI Retry auto-configuration crashes with Spring Boot 3.3.x due to
# a missing Spring Framework class (`org.springframework.core.retry.RetryTemplate`).
# We exclude it so the application can start.
spring.autoconfigure.exclude=org.springframework.ai.retry.autoconfigure.SpringAiRetryAutoConfiguration

spring.ai.retry.max-attempts=3
spring.ai.retry.backoff.initial-interval=500
spring.ai.retry.backoff.multiplier=1.5
spring.ai.retry.backoff.max-interval=2000

# Temporary workaround: duplicate Jackson auto-config modules are being pulled
# onto the classpath (different Spring Boot artifacts), which registers the
# same bean name twice. Allow overriding so the app can start.
spring.main.allow-bean-definition-overriding=true
