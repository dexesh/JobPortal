<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/styles.css}" />
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css} " />
    <link th:rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.css}" />

</head>

<body>
    <header class="navbar navbar-expand-lg navbar-dark">
        <label class="mt-2 ms-5 font-weight-bold h5"><a th:href="@{/dashboard/}">hotdevjobs</a><span
                class="logo_com font-weight-bold h5" style="color: white">
                .com</span></label>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarTogglerDemo02"
            aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarToggler">
            <ul class="navbar-nav m-auto mt-2 mt-lg-0">

                <li class="nav-item active">
                    <a sec:authorize="hasAuthority('Job Seeker')" class="nav-link" th:href="@{/dashboard/}"><i
                            class="fas fa-search"></i>Search for Jobs</a>
                </li>
                <li class="nav-item ">
                    <a sec:authorize="hasAuthority('Job Seeker')" class="nav-link" th:href="@{/saved-jobs/}">
                        <i class="fa-solid fa-eye"></i>View Saved Jobs</a>
                </li>
                <li class="nav-item ">
                    <a sec:authorize="hasAuthority('Job Seeker')" class="nav-link" th:href="@{/job-seeker-profile/}">
                        <i class="fa-solid fa-pencil"></i>Edit Profile</a>
                </li>

                <li class="nav-item ">
                    <a sec:authorize="hasAuthority('Recruiter')" class="nav-link" th:href="@{/dashboard/add}"><i
                            class="fa-solid fa-file-circle-plus"></i>Post New Job</a>
                </li>
                <li class="nav-item active">
                    <a sec:authorize="hasAuthority('Recruiter')" class="nav-link" th:href="@{/dashboard/}"> <i
                            class="fa-solid fa-eye"></i>View Your Jobs</a>
                </li>
                <li class="nav-item ">
                    <a sec:authorize="hasAuthority('Recruiter')" class="nav-link" th:href="@{/recruiter-profile/}"> <i
                            class="fa-solid fa-pencil"></i>Edit Account</a>
                </li>

            </ul>

            <img class="rounded-circle me-3" height="50px" width="50x" th:if="${user.photosImagePath!=null}"
                th:src="@{${user?.photosImagePath}}" />

            <label th:if="${user.firstName != null && user.lastName != null}"
                th:text="${user.firstName+' '+user.lastName}" class="nav-item nav-link px-2 me-3">
            </label>

            <label th:unless="${user.firstName != null && user.lastName != null}" th:text="${username}"
                class="nav-item nav-link px-2 me-3"></label>

            <form th:action="@{/logout}" method="post"><button class="myBtn-light me-5" type="submit">Logout</button></form>
        </div>
    </header>

    <section class="section">
        <div class="sidenav px-5">

            <div sec:authorize="hasAuthority('Job Seeker')">

                <label class="text-uppercase color-dull font-weight-bold">Filter Results</label>
                <hr />
                <form id="myForm" th:action="@{/dashboard/}">

                    <div class="row">
                        <div class="col-lg-12">
                            <label>Employment Type</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:checked="${partTime}" id="Part-time"
                                    name="partTime" th:value="Part-Time" />
                                <label class="form-check-label" for="Part-time">
                                    Part-Time
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="full-time" th:checked="${fullTime}"
                                    name="fullTime" th:value="Full-Time" />
                                <label class="form-check-label" for="full-time">
                                    Full-Time
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="freelance"
                                    th:value="Freelance" name="freelance" th:checked="${freelance}" />
                                <label class="form-check-label" for="freelance">
                                    Freelance
                                </label>
                            </div>
                        </div>
                        <div class="col-lg-12">

                            <label>Remote</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remote-only" th:value="Remote-Only"
                                    name="remoteOnly" th:checked="${remoteOnly}" />
                                <label class="form-check-label" for="remote-only">
                                    Remote-Only
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="Office-Only" th:value="Office-Only"
                                    name="officeOnly" th:checked="${officeOnly}" />
                                <label class="form-check-label" for="Office-Only">
                                    Office-Only
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="partial-remote"
                                    th:value="Partial-Remote" name="partialRemote" th:checked="${partialRemote}" />
                                <label class="form-check-label" for="partial-remote">
                                    Partial-Remote
                                </label>
                            </div>

                        </div>
                        <div class="col-lg-12">
                            <label>Date Posted</label>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="today" name="today"
                                    th:checked="${today}" />
                                <label class="form-check-label" for="today"> Today </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="7days" name="days7"
                                    th:checked="${days7}" />
                                <label class="form-check-label" for="7days">
                                    Last 7 Days
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="30days" name="days30"
                                    th:checked="${days30}" />
                                <label class="form-check-label" for="30days">
                                    Last 30 Days
                                </label>
                            </div>
                        </div>
                    </div>
                    <input id="hidJob" name="job" th:value="${job}" hidden>
                    <input id="hidLoc" name="location" th:value="${location}" hidden>
                </form>
            </div>

        </div>


        <article>

            <div class="box" sec:authorize="hasAuthority('Job Seeker')">
                <h1 class="primary-title">Candidate Dashboard</h1>
                <div class="inner">
                    <input id="job" class="radius-left" type="text" placeholder="Search for a job" name="job"
                        th:value="${job}" />
                    <input id="loc" class="" type="text" placeholder="Job Location" name="location"
                        th:value="${location}" />
                    <button class="radius-right" type="submit" form="myForm"><i class="fa fa-search"></i></button>
                </div>
            </div>

            <div class="box" sec:authorize="hasAuthority('Recruiter')">
                <h1 class="primary-title">Recruiter Dashboard</h1>
            </div>
            <div class="box mt-3">
                <label class="large-label px-3 mb-3" sec:authorize="hasAuthority('Job Seeker')">Search Results</label>
                <th:block th:each="jobPost:${jobPost}">
                    <a th:href="@{/job-details-apply/{id}(id=${jobPost.jobPostId})}"
                        style="text-decoration: none; color: black">
                        <div class="job-row">
                            <div class="row">
                                <div class="col-md-4">
                                    <label class="job-title text-left">
                                        [[${jobPost.jobTitle}]]
                                        <span class="title-span" sec:authorize="hasAuthority('Recruiter')"
                                            th:text="'('+ @{${jobPost.totalCandidates}}+' Candidates Applied)'">(xx
                                            candidates applied)</span>
                                        <span class="title-span" sec:authorize="hasAuthority('Job Seeker')"
                                            th:if="${jobPost.isActive == true}">(Applied)</span>
                                        <span class="title-span" sec:authorize="hasAuthority('Job Seeker')"
                                            th:if="${jobPost.isSaved == true}">(Saved)</span>
                                    </label>
                                </div>
                                <div class="col-md-4 text-center">
                                    <label th:text="${jobPost.jobLocationId.city+', '+ jobPost.jobLocationId.state}">
                                        City State</label>
                                </div>
                                <div class="col-md-4 text-right">
                                    <label th:text="@{${jobPost.jobCompanyId.name}}">Recruiter Company Name</label>
                                </div>
                            </div>
                        </div>
                    </a>
                </th:block>
            </div>
        </article>

        <!-- Job Recommendations Column – Job Seeker only -->
        <aside class="recommendations-aside" sec:authorize="hasAuthority('Job Seeker')">
            <div class="rec-header">
                <i class="fa-solid fa-star rec-icon"></i>
                <span>Job Recommendations</span>
            </div>
            <div class="rec-body" id="rec-body">
                <div class="rec-loading" id="rec-loading">
                    <i class="fa-solid fa-circle-notch fa-spin"></i>
                    <p>Finding matches&hellip;</p>
                </div>
            </div>
        </aside>

        <style>
            /* ── Recommendations aside – proper 3rd column ── */
            .recommendations-aside {
                width: 230px;
                flex: 0 0 230px;
                /* fixed width, does not grow/shrink */
                align-self: flex-start;
                position: sticky;
                top: 0;
                max-height: calc(100vh - 80px);
                overflow-y: auto;
                background: #ffffff;
                border-left: 1px solid #e2e8f0;
                box-shadow: -2px 0 12px rgba(0, 0, 0, .05);
                font-family: 'Segoe UI', sans-serif;
            }

            .rec-header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 14px 14px;
                background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
                color: #fff;
                font-size: 13px;
                font-weight: 700;
                letter-spacing: .3px;
                position: sticky;
                top: 0;
                z-index: 1;
            }

            .rec-icon {
                font-size: 14px;
                color: #fde68a;
            }

            .rec-body {
                padding: 8px 0;
            }

            .rec-card {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 9px 14px;
                border-bottom: 1px solid #f1f5f9;
                color: #1e293b;
                transition: background .15s ease;
            }

            .rec-card:last-child {
                border-bottom: none;
            }

            .rec-card:hover {
                background: #f8faff;
            }

            .rec-job-icon {
                font-size: 12px;
                color: #6366f1;
                flex-shrink: 0;
            }

            .rec-job-title {
                flex: 1;
                font-size: 12px;
                font-weight: 500;
                line-height: 1.4;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .rec-arrow {
                font-size: 10px;
                color: #94a3b8;
                flex-shrink: 0;
            }

            .rec-empty {
                padding: 18px 14px;
                text-align: center;
                color: #94a3b8;
            }

            .rec-empty i {
                font-size: 26px;
                margin-bottom: 8px;
                color: #c7d2fe;
            }

            .rec-empty p {
                font-size: 11.5px;
                line-height: 1.5;
                margin: 0;
            }

            .rec-body::-webkit-scrollbar {
                width: 4px;
            }

            .rec-body::-webkit-scrollbar-thumb {
                background: #c7d2fe;
                border-radius: 4px;
            }

            .rec-loading {
                padding: 18px 14px;
                text-align: center;
                color: #94a3b8;
            }

            .rec-loading i {
                font-size: 22px;
                color: #c7d2fe;
                margin-bottom: 6px;
            }

            .rec-loading p {
                font-size: 11.5px;
                margin: 0;
            }
        </style>

    </section>

    <script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

    <script type="text/javascript" th:src="@{/js/main.js}"></script>
    <script th:inline="javascript">
        $('#job').change(function () {
            $('#hidJob').val($(this).val());
        });
        $('#loc').change(function () {
            $('#hidLoc').val($(this).val());
        });

        // Load job recommendations – cached in sessionStorage so the
        // backend PDF/Pinecone pipeline only runs ONCE per browser session.
        (function loadRecommendations() {
            var body = document.getElementById('rec-body');
            if (!body) return;

            // Cache key is scoped to the logged-in user so switching accounts
            // never shows a previous user's recommendations.
            var CACHE_KEY = 'jobRecommendations_v2_' + /*[[${username}]]*/ 'guest';

            function escapeHtml(value) {
                var node = document.createElement('div');
                node.textContent = value == null ? '' : String(value);
                return node.innerHTML;
            }

            function renderJobs(payload) {
                var jobs = payload && payload.jobs;
                if (!jobs || jobs.length === 0) {
                    body.innerHTML =
                        '<div class="rec-empty">' +
                        '<i class="fa-solid fa-file-circle-question"></i>' +
                        '<p>' + escapeHtml((payload && payload.message) || 'No matching jobs were found.') + '</p>' +
                        '</div>';
                    return;
                }
                var html = '';
                jobs.forEach(function (job) {
                    html +=
                        '<a href="/job-details-apply/' + job.jobPostId + '" class="rec-card" style="text-decoration:none;">' +
                        '<i class="fa-solid fa-briefcase rec-job-icon"></i>' +
                        '<span class="rec-job-title">' + escapeHtml(job.jobTitle) + '</span>' +
                        '<i class="fa-solid fa-chevron-right rec-arrow"></i>' +
                        '</a>';
                });
                body.innerHTML = html;
            }

            // Use cached result if available (same tab session)
            var cached = null;
            if (cached) {
                try {
                    renderJobs(JSON.parse(cached));
                    return; // ← backend NOT called
                } catch (e) {
                    sessionStorage.removeItem(CACHE_KEY);
                }
            }

            // First visit: call backend and cache the result
            fetch('/dashboard/recommendations')
                .then(function (res) {
                    if (!res.ok) throw new Error('Recommendation request failed: ' + res.status);
                    return res.json();
                })
                .then(function (payload) {
                    // Only cache non-empty results.
                    // Empty = no resume yet; don't cache so the next visit
                    // re-fetches after the user uploads their resume.
                    if (payload && payload.jobs && payload.jobs.length > 0) {
                        sessionStorage.setItem(CACHE_KEY, JSON.stringify(payload));
                    }
                    renderJobs(payload);
                })
                .catch(function () {
                    body.innerHTML =
                        '<div class="rec-empty">' +
                        '<i class="fa-solid fa-triangle-exclamation"></i>' +
                        '<p>Could not load recommendations.</p>' +
                        '</div>';
                });
        })();
    </script>

</body>

</html>
